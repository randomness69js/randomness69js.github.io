<!DOCTYPE html>
<html>
  <title> Randomness69 World </title>
  <head>
   <style>
     html {
      height: 100%;
     }
     body {
      background-image: repeating-linear-gradient(black, black 10%, black 40%);
      background-repeat: no-repeat;
      height: 100%;
      margin: 0;
     }
     
     @font-face {
      font-family: sillymariofont;
      src: url(https://smg200world.neocities.org/SuperMario256.ttf);
     }
     @font-face {
      font-family: sillymariofont2;
      src: url(https://smg200world.neocities.org/SuperMarioBeta256.ttf);
     }
    
     header {
      text-align: center;
      padding: 150px;
      border-bottom: 4px solid #000000;
     }
     
     #smg200worldicon {
      margin: 0;
      margin-top: 60px;
      margin-bottom: -30px;
     }
     
     #toptitle {
      position: absolute;
      top: 10%;
      left: 50%;
     -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
     }
     
     #title {
      font-family: sillymariofont;
      font-size: 80px;
      color: red;
      margin-top: 0px;
      margin-bottom: -30px;
        -webkit-text-stroke: 3px white;
     }
     #card {
      background: linear-gradient(0deg, rgba(5, 5, 5, 1), rgba(45, 45, 45, 1));
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      outline: 5px solid white;
     }
     #charlist {
      width: 90%;
      margin: 0 auto;
      max-width: 1200px;
     }

   </style>
   
   
  </head>
  <body>
  <audio autoplay loop>
   <source src="https://files.catbox.moe/wg2o1x.mp3" type="audio/mpeg">
   Your browser does not support the audio element.
  </audio>
  <header>
  <div id="toptitle">
   <center> <a href="https://smg200world.neocities.org/" > <img id="smg200worldicon" src="worldlogosmg.png" width="400px" height="200px" > </a> </center>
   <p id="title"> Characters </p>
  </div>
  </header>
  <div id="charlist">
   <center> 
    <div id="card">
     <img src="https://smg200world.neocities.org/info/characterphotos/CharSMG200.jpg" height="150px" width="150px">
     <img src="https://smg200world.neocities.org/info/characterphotos/CharRift.jpg" height="150px" width="150px">
     <img src="https://smg200world.neocities.org/info/characterphotos/CharDevkit.jpg" height="150px" width="150px">
     <img src="https://smg200world.neocities.org/info/characterphotos/CharSoviet.jpg" height="150px" width="150px">
     <img src="https://smg200world.neocities.org/info/characterphotos/CharMrpuzzles.jpg" height="150px" width="150px">
     <img src="https://smg200world.neocities.org/info/characterphotos/CharHoodbro.jpg" height="150px" width="150px">
    </div> 
  </center>
  </div>
  </body>
</html>
