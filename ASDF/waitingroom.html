<html>
<body>

<script>
  var audioElement0 = document.createElement('audio');
audioElement0.setAttribute('src', 'graffiti.mp3');
audioElement0.setAttribute('autoplay', 'autoplay');
audioElement0.addEventListener("canplaythrough", () => {
   audioElement0.play().catch(e => {
      
      window.addEventListener('click', () => {
         audioElement0.play()
            }, { once: true })

   })
});

if (localStorage.getItem("queue")==null) {
localStorage.setItem("queue", 864000);
} else {
  var intervalID = window.setInterval(d, 100);

function d() {

qu=localStorage.getItem("queue")
qu=parseInt(qu)
qu-=1
if (qu==863000){
  audioElement0.pause()
var audioElement0 = document.createElement('audio');
audioElement0.setAttribute('src', 'https://randomness69js.github.io/media/Amb1.wav');

         audioElement0.play()

   })

}

}
}

</script>
