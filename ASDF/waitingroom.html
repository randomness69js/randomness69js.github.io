<html>
<body>
<center>
  <h2>Please wait. Your queue number is: </h2>
  <h3 id="number">1284</h3>
</center>
</body>
<script>
if (localStorage.getItem("queue")==null) {
localStorage.setItem("queue", 1284);
} else {
  var intervalID = window.setInterval(d, 50);

function d() {

qu=localStorage.getItem("queue")
qu=parseInt(qu)
if (qu<1300&&qu>1000) {
qu+=(Math.round(Math.random(2)*2)-1)
}
if (qu<1000&&qu>800) {
qu+=(Math.round(Math.random(2)*2)-3)
}
if (qu<800&&qu>200) {
qu-=(Math.round(Math.random(3)*3))
}
if (qu<200&&qu>0) {
qu-=1
}
if (qu==0) {
alert("You won")
}

  document.getElementById('number').innerText=localStorage.getItem("queue");
localStorage.setItem("queue", qu);
}
}
</script>
</html>
